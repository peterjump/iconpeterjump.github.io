<!DOCTYPE html>
<html lang="zh-CN">
	
<audio id="myAudioLeft" src="左左.m4a" preload="auto"></audio>
<audio id="myAudioRight" src="右右.m4a" preload="auto"></audio>
<audio id="myAudioDown" src="下下.m4a" preload="auto"></audio>
<audio id="myAudioUp" src="上上.m4a" preload="auto"></audio>
 
<head>
    <meta charset="UTF-8" />
    <title>华容道</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: #f5e6d3;
            margin: 0;
        }
        h1 {
            color: #8B0000;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px white;
        }
        .board-container {
            position: relative;
            width: 266px;
            height: 442px;
            margin: 0 auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            grid-template-rows: repeat(7, 60px);
            gap: 2px;
            background: #8B4513;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
        }
        .cell {
            width: 60px;
            height: 60px;
            background: #f0d9b5;
            border: 1px solid #b58863;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #8B0000;
        }
        .exit-cell {
            background: linear-gradient(to right, #cd853f, #e6ccb2);
            color: white;
            text-shadow: 1px 1px 1px black;
        }
        .hidden-cell {
            visibility: hidden;
        }
        #tiles {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 246px;
            height: 422px;
            pointer-events: none;
            z-index: 10;
        }
        .tile {
            position: absolute;
            background: #a67c52; /* 深木色，区别于棋盘 */
            border: 2px solid #8B4513;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            pointer-events: auto;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .tile.selected {
            border: 3px solid #ff0000;
            outline: 2px solid yellow;
            outline-offset: -2px;
            z-index: 20;
        }

        /* 图片容器：占 75% 高度 */
        .tile-img-container {
            width: 100%;
            height: 75%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #8B4513;
            border-bottom: 1px solid #8B4513;
        }

        /* 关键：根据棋子宽度动态调整图片拉伸方式 */
        .tile img {
            max-height: 95%;
            object-fit: contain;
            object-position: center;
        }

        /* 特别优化：横向2格的棋子（如关羽）——让图片横向拉伸 */
        .tile[data-wide="true"] .tile-img-container {
            justify-content: flex-start; /* 左对齐，避免居中留白 */
        }
        .tile[data-wide="true"] .tile-img-container img {
            max-width: 98%;
            width: 100%; /* 尽可能填满宽度 */
            height: auto;
            object-fit: scale-down; /* 等比缩小，但优先填满宽度 */
        }

        /* 名字区域 */
        .name {
            width: 100%;
            height: 25%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: yellow;
            text-shadow: 1px 1px 1px black;
            background: #8B4513;
            border-top: 1px solid #a67c52;
        }
    </style>
</head>
<body>

<h1>华容道</h1>

<div class="board-container">
    <div class="grid" id="grid"></div>
    <div id="tiles"></div>
</div>
<div class="controls">
    <button onclick="resetGame()">随机开局</button>
    <button onclick="specGame()">指定开局</button>
</div>
<div id="message">提示：点击选中棋子，用 ↑↓←→ 键移动</div>
<script>
    const ROWS = 7;
    const COLS = 4;
    let board = Array(ROWS).fill().map(() => Array(COLS).fill(null));
    let tiles = [];
    let selectedTileId = null;
    let isSolved = false;


    function isValidCell(r, c) {
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
        if (r >= 5 && c !== 2) return false;
        return true;
    }

    const pieceTypes = [
        { name: "曹操", img: "caocao.jpg", w: 1, h: 2 },
        { name: "赵云", img: "zhaoyun.jpg", w: 1, h: 2 },
        { name: "关羽", img: "guanyu.jpg", w: 2, h: 1 },
        { name: "兵",   img: "soldier.jpg", w: 1, h: 1 }
    ];
   
 function playSoundLeft() {
    var audio = document.getElementById('myAudioLeft');
    audio.play().catch(error => console.error('播放失败', error));
   }
 function playSoundRight() {
    var audio = document.getElementById('myAudioRight');
    audio.play().catch(error => console.error('播放失败', error));
   }
 function playSoundDown() {
    var audio = document.getElementById('myAudioDown');
    audio.play().catch(error => console.error('播放失败', error));
   }
 function playSoundUp() {
    var audio = document.getElementById('myAudioUp');
    audio.play().catch(error => console.error('播放失败', error));
   }

    function createGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                if ((r === 5 || r === 6) && c === 2) {
                    cell.textContent = r === 5 ? "出" : "口";
                    cell.classList.add('exit-cell');
                } else if ((r === 5 || r === 6) && c !== 2) {
                    cell.classList.add('hidden-cell');
                }
                grid.appendChild(cell);
            }
        }
    }

    function canPlace(w, h, r, c, excludeId = null) {
        for (let dr = 0; dr < h; dr++) {
            for (let dc = 0; dc < w; dc++) {
                const nr = r + dr;
                const nc = c + dc;
                if (!isValidCell(nr, nc)) return false;
                if (board[nr][nc] !== null && board[nr][nc] !== excludeId) {
                    return false;
                }
            }
        }
        return true;
    }

   function specBoard() {
        board = Array(ROWS).fill().map(() => Array(COLS).fill(null));
        tiles = [];
        selectedTileId = null;
        isSolved = false;
        
        createGrid();
        document.getElementById('tiles').innerHTML = '';

        let success = false;

        if (!success) {
            fallbackLayout();
        }

        checkWin();
    }        
    function initBoard() {
        board = Array(ROWS).fill().map(() => Array(COLS).fill(null));
        tiles = [];
        selectedTileId = null;
        isSolved = false;

        createGrid();
        document.getElementById('tiles').innerHTML = '';

        let success = false;
        for (let i = 0; i < 10; i++) {
            if (generateRandomLayout()) {
                success = true;
                break;
            }
            board = Array(ROWS).fill().map(() => Array(COLS).fill(null));
            tiles = [];
            document.getElementById('tiles').innerHTML = '';
        }

        if (!success) {
            fallbackLayout();
        }

        checkWin();
    }

    function generateRandomLayout() {
        const shuffled = [...pieceTypes].sort(() => Math.random() - 0.5);
        for (const piece of shuffled) {
            const placements = [];
            for (let r = 0; r <= ROWS - piece.h; r++) {
                for (let c = 0; c <= COLS - piece.w; c++) {
                    if (canPlace(piece.w, piece.h, r, c)) {
                        placements.push({ r, c });
                    }
                }
            }

            if (placements.length === 0) return false;

            const { r, c } = placements[Math.floor(Math.random() * placements.length)];
            createTile(piece.name, piece.img, piece.w, piece.h, r, c);
        }

        const caocao = tiles.find(t => t.name === "曹操");
        if (!caocao) return false;
        if (caocao.r === 5 && caocao.c === 2) return false;

        const canMove = [
            { dr: -1, dc: 0 }, { dr: 1, dc: 0 },
            { dr: 0, dc: -1 }, { dr: 0, dc: 1 }
        ].some(dir => canPlace(caocao.w, caocao.h, caocao.r + dir.dr, caocao.c + dir.dc, caocao.id));

        return canMove;
    }

    function fallbackLayout() {
        createTile("曹操", "caocao.jpg", 1, 2, 0, 3);
        createTile("赵云", "zhaoyun.jpg", 1, 2, 3, 1);
        createTile("关羽", "guanyu.jpg", 2, 1, 4, 2);
        createTile("兵",   "soldier.jpg", 1, 1, 3, 2);
    }

    function createTile(name, imgSrc, w, h, r, c) {
        const id = tiles.length;
        const tile = { id, name, imgSrc, w, h, r, c, element: null };
        tiles.push(tile);

        for (let dr = 0; dr < h; dr++) {
            for (let dc = 0; dc < w; dc++) {
                const nr = r + dr;
                const nc = c + dc;
                if (isValidCell(nr, nc)) {
                    board[nr][nc] = id;
                }
            }
        }

        const el = document.createElement('div');
        el.className = 'tile';
        el.style.width = `${60 * w}px`;
        el.style.height = `${60 * h}px`;
        el.style.left = `${c * 62}px`;
        el.style.top = `${r * 62}px`;
        el.dataset.id = id;

        // 如果是横向宽棋子（w > 1），添加 data-wide 属性用于CSS优化
        if (w > 1) {
            el.setAttribute('data-wide', 'true');
        }

        const imgContainer = document.createElement('div');
        imgContainer.className = 'tile-img-container';

        const img = new Image();
        img.src = imgSrc;
        img.alt = name;
        imgContainer.appendChild(img);

        const nameEl = document.createElement('div');
        nameEl.className = 'name';
        nameEl.textContent = name;

        el.appendChild(imgContainer);
        el.appendChild(nameEl);
        el.addEventListener('click', () => selectTile(id));
        tile.element = el;
        document.getElementById('tiles').appendChild(el);
    }

    function selectTile(id) {
        if (selectedTileId !== null) {
            const prev = tiles[selectedTileId];
            if (prev && prev.element) {
                prev.element.classList.remove('selected');
            }
        }

        selectedTileId = id;
        const tile = tiles[id];
        if (tile) {
            tile.element.classList.add('selected');
            document.getElementById('message').textContent = `✅ 已选中：${tile.name}，使用方向键移动`;
        }
    }

    function moveSelectedTile(dr, dc) {
        if (selectedTileId === null || isSolved) return;
        const tile = tiles[selectedTileId];
        if (!tile) return;

        const nr = tile.r + dr;
        const nc = tile.c + dc;

        if (canPlace(tile.w, tile.h, nr, nc, selectedTileId)) {
            moveTile(selectedTileId, dr, dc);
        } else {
            document.getElementById('message').textContent = `❌ 无法移动：目标位置无效或被占据`;
            setTimeout(() => {
                if (selectedTileId !== null) {
                    const t = tiles[selectedTileId];
                    document.getElementById('message').textContent = `✅ 已选中：${t.name}，使用方向键移动`;
                }
            }, 1000);
        }
    }

    function moveTile(id, dr, dc) {
        const tile = tiles[id];

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c] === id) board[r][c] = null;
            }
        }

        tile.r += dr;
        tile.c += dc;

        for (let dr = 0; dr < tile.h; dr++) {
            for (let dc = 0; dc < tile.w; dc++) {
                const nr = tile.r + dr;
                const nc = tile.c + dc;
                if (isValidCell(nr, nc)) {
                    board[nr][nc] = id;
                }
            }
        }

        tile.element.style.left = `${tile.c * 62}px`;
        tile.element.style.top = `${tile.r * 62}px`;

        checkWin();
    }

    function checkWin() {
        const caocao = tiles.find(t => t.name === "曹操");
        if (caocao && caocao.r === 5 && caocao.c === 2 && caocao.h === 2) {
            if (!isSolved) {
                isSolved = true;
                document.getElementById('message').textContent = "🎉 恭喜！曹操从第六行和第七行逃脱！";
                document.getElementById('message').style.color = "green";
            }
        }
    }

    function resetGame() {
        initBoard();
        document.getElementById('message').textContent = "🎲 已生成随机开局，开始挑战吧！";
        document.getElementById('message').style.color = "#8B0000";
    }
    function specGame() {
        specBoard();
        document.getElementById('message').textContent = "🎲 按指定开局，开始挑战吧！";
        document.getElementById('message').style.color = "#8B0000";
    }

    document.addEventListener('keydown', (e) => {
        switch (e.key) {
            case 'ArrowUp':
            playSoundUp();
                e.preventDefault(); moveSelectedTile(-1, 0); break;
            case 'ArrowDown':
            playSoundDown();
                e.preventDefault(); moveSelectedTile(1, 0); break;
            case 'ArrowLeft':
            playSoundLeft();
                e.preventDefault(); moveSelectedTile(0, -1); break;
            case 'ArrowRight':
            playSoundRight();
                e.preventDefault(); moveSelectedTile(0, 1); break;
        }
    });

//    initBoard();
    specBoard();
</script>

</body>
</html>
